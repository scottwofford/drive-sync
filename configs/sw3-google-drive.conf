# Scott's personal Google Drive sync (scottwofford3@gmail.com)
# Local only — no GitHub push

REMOTE="gdrive-personal"
LOCAL_DIR="/Users/scottwofford/build/sw3-google-drive"
SYNC_SUBDIR="drive"
GIT_PUSH=false
CONVERT_DOCX=true
SKIP_DANGLING_SHORTCUTS=true

EXCLUDES=(
    "*.mp4"
    "*.webm"
    "*.mkv"
    "*.wav"
    "*.zip"
    "*Recording*"
    "Luthien/**"
    "Meet Recordings/**"
    "5 Music/**"
    "pre-2021 Archive/**"
    "pre-2016 Archives/**"
    # View-only Drive files (googleapi 403 cannotDownloadFile): rclone retries 3x
    # on every sync, logs rclone_forward_fail, and burns ~5min/run. Excluded by
    # name. If more view-only files surface, add them here. Sustained failure
    # since 2026-02-08 documented in COE-2026-05-07-claude-ai-sync-silent-rot.md.
    "Coatue EMW 2025 - Keynote.pdf"
)

REVERSE_SYNC_REMOTE=""
REVERSE_SYNC_INCLUDES=()
