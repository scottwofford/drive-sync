# Private Claude Code docs → Scott's personal Google Drive (sw3@gmail)
# Reverse sync only — pushes local .md/.csv files to Drive.
# git is the source of truth; Drive is a derived view for cross-surface reading.
# Forward sync would clobber the working tree with the (often older) Drive copy
# whenever someone edits CLAUDE.md from another machine — see COE 2026-05-02.

MODE="reverse"

REMOTE="gdrive-personal-claude-docs"
LOCAL_DIR="/Users/scottwofford/build/private-claude-code-docs"
SYNC_SUBDIR=""
GIT_PUSH=false
CONVERT_DOCX=false
SKIP_DANGLING_SHORTCUTS=true

EXCLUDES=()

REVERSE_SYNC_REMOTE="gdrive-personal-claude-docs"
REVERSE_SYNC_INCLUDES=("*.md" "*.csv")
